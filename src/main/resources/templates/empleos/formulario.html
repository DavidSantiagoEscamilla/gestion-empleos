<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Empleo</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<nav class="navbar">
    <h1>Sistema de Gestion</h1>
    <div>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/usuarios}">Usuarios</a>
        <a th:href="@{/empleos}">Empleos</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2 class="titulo" th:text="${empleo.id == null} ? 'Nuevo Empleo' : 'Editar Empleo'">Formulario</h2>

        <form th:action="@{/empleos/guardar}" th:object="${empleo}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="nombre">Nombre del Empleo</label>
                <input type="text" id="nombre" th:field="*{nombre}">
                <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
            </div>

            <div class="form-group">
                <label for="categoria">Categoria</label>
                <input type="text" id="categoria" th:field="*{categoria}">
                <span class="error" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></span>
            </div>

            <div class="form-group">
                <label for="areaTrabajo">Area de Trabajo</label>
                <input type="text" id="areaTrabajo" th:field="*{areaTrabajo}">
                <span class="error" th:if="${#fields.hasErrors('areaTrabajo')}" th:errors="*{areaTrabajo}"></span>
            </div>

            <div class="form-group">
                <label for="empresa">Empresa</label>
                <input type="text" id="empresa" th:field="*{empresa}">
                <span class="error" th:if="${#fields.hasErrors('empresa')}" th:errors="*{empresa}"></span>
            </div>

            <div class="form-group">
                <label for="nivel">Nivel</label>
                <select id="nivel" th:field="*{nivel}">
                    <option value="">-- Seleccione --</option>
                    <option value="Junior">Junior</option>
                    <option value="Semi-Senior">Semi-Senior</option>
                    <option value="Senior">Senior</option>
                    <option value="Lider">Lider</option>
                </select>
                <span class="error" th:if="${#fields.hasErrors('nivel')}" th:errors="*{nivel}"></span>
            </div>

            <div class="form-group">
                <label for="sueldo">Sueldo (COP)</label>
                <input type="number" step="0.01" id="sueldo" th:field="*{sueldo}">
                <span class="error" th:if="${#fields.hasErrors('sueldo')}" th:errors="*{sueldo}"></span>
            </div>

            <div class="form-group">
                <label for="funciones">Funciones</label>
                <textarea id="funciones" th:field="*{funciones}"></textarea>
                <span class="error" th:if="${#fields.hasErrors('funciones')}" th:errors="*{funciones}"></span>
            </div>

            <div class="form-group">
                <label for="cargoJefe">Cargo del Jefe</label>
                <input type="text" id="cargoJefe" th:field="*{cargoJefe}">
                <span class="error" th:if="${#fields.hasErrors('cargoJefe')}" th:errors="*{cargoJefe}"></span>
            </div>

            <div class="form-acciones">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a th:href="@{/empleos}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
