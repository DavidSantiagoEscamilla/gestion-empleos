<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<nav class="navbar">
    <h1>Sistema de Gestion</h1>
    <div>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/usuarios}">Usuarios</a>
        <a th:href="@{/empleos}">Empleos</a>
    </div>
</nav>
<div class="container">
    <div class="card">
        <div class="barra-superior">
            <h2 class="titulo">Listado de Usuarios</h2>
            <a th:href="@{/usuarios/agregar}" class="btn btn-primary">+ Nuevo Usuario</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>CEDULA</th>
                <th>CLAVE</th>
                <th>NOMBRE</th>
                <th>EMAIL</th>
                <th>ACCIONES</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.cedula}"></td>
                <td th:text="${usuario.clave}"></td>
                <td th:text="${usuario.nombre}"></td>
                <td th:text="${usuario.email}"></td>
                <td>
                    <div class="acciones">
                        <a th:href="@{/usuarios/editar/{c}(c=${usuario.cedula})}" class="btn btn-edit">Editar</a>
                        <a th:href="@{/usuarios/eliminar/{c}(c=${usuario.cedula})}" class="btn btn-delete"
                           onclick="return confirm('¿Eliminar este usuario?');">Eliminar</a>
                    </div>
                </td>
            </tr>
            <tr th:if="${usuarios.isEmpty()}">
                <td colspan="5" class="vacio">No hay usuarios registrados.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
