<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Datos del Usuario</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<nav class="navbar">
    <h1>Sistema de Gestion</h1>
    <div>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/usuarios}">Usuarios</a>
        <a th:href="@{/empleos}">Empleos</a>
    </div>
</nav>
<div class="container">
    <div class="card">
        <h2 class="titulo">Datos del Usuario</h2>
        <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">

            <div class="form-group">
                <label for="cedula">CEDULA</label>
                <input type="text" id="cedula" th:field="*{cedula}" required>
                <span class="error" th:if="${#fields.hasErrors('cedula')}" th:errors="*{cedula}"></span>
            </div>

            <div class="form-group">
                <label for="clave">CLAVE</label>
                <input type="password" id="clave" th:field="*{clave}">
                <span class="error" th:if="${#fields.hasErrors('clave')}" th:errors="*{clave}"></span>
            </div>

            <div class="form-group">
                <label for="nombre">NOMBRE</label>
                <input type="text" id="nombre" th:field="*{nombre}" required>
                <span class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
            </div>

            <div class="form-group">
                <label for="email">EMAIL</label>
                <input type="email" id="email" th:field="*{email}">
                <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-acciones">
                <input type="reset" value="LIMPIAR" class="btn btn-secondary">
                <button type="submit" class="btn btn-primary">GUARDAR</button>
                <a th:href="@{/usuarios}" class="btn btn-secondary">REGRESAR</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
